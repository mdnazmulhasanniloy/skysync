services:
  backend:
    image: nazmulhasn/skysync_backend:latest
    container_name: skysync_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production  
    expose:
      - '5000'
      - '5005' 
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - skysync_net


  dashboard:
    image: skysyncapp/skysync_admin:latest
    container_name: skysync_admin
    restart: unless-stopped 
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://api.skysync.it.com/api/v1
      - PORT=3005
    expose:
      - '3005'
    networks:
      - skysync_net

  nginx:
    image: nginx:1.25-alpine
    container_name: skysync_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - skysync_net

  certbot:
    image: certbot/certbot:latest
    container_name: skysync_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - skysync_net  
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"


  mongo:
    image: mongo:7.0
    container_name: skysync_mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile"]
    environment:
      MONGO_INITDB_DATABASE: skysync_db
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    expose:
      - '27017'
    ports:
      - '127.0.0.1:27017:27017'
    networks:
      - skysync_net
  
  mongo-init:
    image: mongo:7.0
    container_name: skysync_mongo_init
    restart: "no"
    command: |
      bash -c "
        sleep 10 &&
        mongosh --host mongo --authenticationDatabase admin -u $$MONGO_ROOT_USER -p $$MONGO_ROOT_PASSWORD --eval '
          try { rs.status() } catch(e) {
            rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]});
          }
        '
      "
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    depends_on:
      mongo:
        condition: service_started
    networks:
      - skysync_net

  redis:
    image: redis:7.2-alpine
    container_name: skysync_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    networks:
      - skysync_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  skysync_net:
    driver: bridge
 